{% load pwa %}
<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Vendas - Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    {% progressive_web_app_meta %}
</head>

<body class="text-bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="shadow rounded-3 bg-white p-4" style="width: 100%; max-width: 400px;">

        <div class="text-center mb-4">
            <i class="bi bi-person-plus fs-1 text-dark"></i>
            <h4 class="text-dark">Criar Conta</h4>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">

            <div class="ms-1">
                {{ message }}
            </div>

            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>

        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" class="form-control" placeholder="Username" aria-label="Username"
                    aria-describedby="basic-addon1" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon2">
                    <i class="bi bi-envelope"></i>
                </span>
                <input type="email" name="email" class="form-control" placeholder="Email" aria-label="Email"
                    aria-describedby="basic-addon2" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon3">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="senha" id="senha" class="form-control" placeholder="Senha" aria-label="Senha"
                    aria-describedby="basic-addon3" required>
                </span>
                <span class="input-group-text">
                    <i class="bi bi-eye-slash" id="toggleSenha" style="cursor: pointer;"></i>
                </span>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon4">
                    <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password" name="confirmar_senha" id="confirmar_senha" class="form-control"
                    placeholder="Confirmar senha" aria-label="Confirmar senha" aria-describedby="basic-addon4" required>
            </div>

            <button class="btn btn-dark w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Cadastrar
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-dark">
                Já tem conta?
                <a href="{% url 'login' %}" class="text-decoration-none">Entrar</a>
            </small>
        </div>

    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const senha = document.getElementById("senha");
    const confirmar = document.getElementById("confirmar_senha");
    const toggle = document.getElementById("toggleSenha");

    toggle.addEventListener("click", () => {

        const isHidden = senha.type === "password";

        senha.type = isHidden ? "text" : "password";
        confirmar.type = isHidden ? "text" : "password";

        toggle.classList.toggle("bi-eye");
        toggle.classList.toggle("bi-eye-slash");
    });
</script>

</html>
