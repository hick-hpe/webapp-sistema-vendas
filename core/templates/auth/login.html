{% load pwa %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SalesHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    {% progressive_web_app_meta %}

</head>

<body class="text-bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="shadow rounded-3 bg-white p-4" style="width: 100%; max-width: 400px;">

        <div class="text-center mb-4">
            <i class="bi bi-person-circle fs-1 text-dark"></i>
            <h4 class="text-dark">Login</h4>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">

            <div class="ms-1">
                {{ message }}
            </div>

            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Close"></button>

        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" class="form-control" placeholder="Username" aria-label="Username"
                    aria-describedby="basic-addon1" required>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon2">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="senha" class="form-control" placeholder="Senha" aria-label="Senha"
                    aria-describedby="basic-addon2" required id="senha">
                <span class="input-group-text">
                    <i class="bi bi-eye-slash" id="toggleSenha" style="cursor: pointer;"></i>
                </span>
            </div>

            <button class="btn btn-dark w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Entrar
            </button>

            <div class="text-center mt-3">
                <small class="text-dark">
                    Não tem conta?
                    <a href="{% url 'cadastro' %}" class="text-decoration-none">
                        Criar conta
                    </a>
                </small>
            </div>
        </form>

    </div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

<script>
    document.getElementById('toggleSenha').addEventListener('click', () => {
        let senha = document.getElementById('senha');
        if (senha.type === 'password') {
            senha.type = 'text';
            this.classList.remove('bi-eye-slash');
            this.classList.add('bi-eye');
        } else {
            senha.type = 'password';
            this.classList.remove('bi-eye');
            this.classList.add('bi-eye-slash');
        }
    });
</script>

</html>
